# ==================== Basic Settings ====================
set -g default-terminal "tmux-256color"
set -g history-limit 100000

# ==================== General Behavior ====================
set -g mouse on                    # Enable mouse (click panes, resize, scroll, drag to copy)
setw -g mode-keys vi               # Vim keys in copy/scroll mode

# ==================== Pane & Window Creation ====================
# Split panes and keep current working directory
bind % split-window -h -c "#{pane_current_path}"
bind \" split-window -v -c "#{pane_current_path}"

# New window also keeps current directory
bind c new-window -c "#{pane_current_path}"

# ==================== Vim-style Copy Mode ====================
# Search and navigation (your original bindings)
bind-key -T copy-mode-vi / send -X search-backward
bind-key -T copy-mode-vi ? send -X search-forward
bind-key -T copy-mode-vi n send -X search-again
bind-key -T copy-mode-vi N send -X search-reverse
bind-key -T copy-mode-vi C-u send -X halfpage-up
bind-key -T copy-mode-vi C-d send -X halfpage-down
bind-key -T copy-mode-vi ^ send -X start-of-line
bind-key -T copy-mode-vi $ send -X end-of-line

# Selection and copying
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel
bind-key -T copy-mode-vi Y send-keys -X copy-pipe-and-cancel

# Enter key also copies (nice bonus)
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel

# Mouse drag automatically copies to system clipboard
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel

# ==================== Smart Cross-Platform Clipboard ====================
if-shell "uname | grep -q Darwin" {
    # macOS
    bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
    bind-key -T copy-mode-vi Y send-keys -X copy-pipe-and-cancel "pbcopy"
    bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
    bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
} {
    # Linux
    if-shell "command -v xclip > /dev/null" {
        bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -i"
        bind-key -T copy-mode-vi Y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -i"
        bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -i"
        bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -i"
    } {
        if-shell "command -v xsel > /dev/null" {
            bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xsel -i --clipboard"
            bind-key -T copy-mode-vi Y send-keys -X copy-pipe-and-cancel "xsel -i --clipboard"
            bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "xsel -i --clipboard"
            bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xsel -i --clipboard"
        } {
            # Wayland fallback
            if-shell "command -v wl-copy > /dev/null" {
                bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"
                bind-key -T copy-mode-vi Y send-keys -X copy-pipe-and-cancel "wl-copy"
                bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "wl-copy"
                bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "wl-copy"
            }
        }
    }
}

# Optional: Quick reload of config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"
